<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expedição Meli Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0b0e11; --card: #161b22; --text: #f0f6fc; 
            --primary: #2f81f7; --warning: #d29922; --success: #238636; --accent: #79c0ff;
            --danger: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 40px; }
        
        /* Header Play Store Style */
        .app-header { background: var(--card); padding: 20px; text-align: center; border-bottom: 1px solid #30363d; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #clock { font-size: 36px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .date-label { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }

        /* Tabs modernas */
        .tabs-container { position: sticky; top: 0; z-index: 99; background: var(--bg); padding-top: 10px; border-bottom: 1px solid #30363d; }
        .tabs-row { display: flex; overflow-x: auto; gap: 8px; padding: 0 15px 10px; scrollbar-width: none; }
        .tabs-row::-webkit-scrollbar { display: none; }
        .tab { padding: 12px 20px; border: none; background: #21262d; color: #8b949e; font-weight: 600; border-radius: 12px; cursor: pointer; white-space: nowrap; font-size: 13px; transition: 0.3s; }
        .tab.active { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(47, 129, 247, 0.4); }
        .tab.hist-tab.active { background: #fff; color: #000; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        /* Card de Adição */
        .add-box { background: var(--card); padding: 20px; border-radius: 24px; margin-bottom: 20px; border: 1px solid #30363d; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .input-main { width: 100%; padding: 16px; background: #0d1117; color: #fff; border: 2px solid #30363d; border-radius: 16px; margin-bottom: 15px; font-size: 16px; font-weight: 600; outline: none; transition: 0.3s; text-align: center; text-transform: uppercase; }
        .input-main:focus { border-color: var(--primary); }

        /* Seletor de Cores */
        .color-picker { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .color-opt { width: 35px; height: 35px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .color-opt.active { border-color: #fff; transform: scale(1.2); }

        /* Contadores */
        .counter-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .counter-card { flex: 1; background: #0d1117; padding: 12px; border-radius: 18px; text-align: center; border: 1px solid #30363d; }
        .counter-card small { font-size: 10px; color: #8b949e; font-weight: 700; text-transform: uppercase; }
        .counter-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        .btn-round { width: 40px; height: 40px; border-radius: 12px; border: none; background: #30363d; color: #fff; font-size: 20px; font-weight: bold; cursor: pointer; }
        .qty-val { font-size: 22px; font-weight: 800; color: #fff; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .bloco { border-radius: 24px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; min-height: 140px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .bloco-rua { font-size: 14px; font-weight: 700; text-transform: uppercase; }
        .bloco-qtd { font-size: 52px; font-weight: 800; line-height: 1; margin: 10px 0; }
        .bloco-status { font-size: 10px; font-weight: 600; padding: 4px 10px; background: rgba(0,0,0,0.2); border-radius: 20px; align-self: flex-start; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card); width: 100%; max-width: 500px; padding: 30px; border-radius: 32px 32px 0 0; animation: slideUp 0.3s ease-out; max-height: 90vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .btn-big { width: 100%; padding: 18px; border: none; border-radius: 20px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-info { background: #1f6feb; color: #fff; }

        .hist-item { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 10px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        select { width: 100%; padding: 16px; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 16px; font-size: 15px; margin: 10px 0; outline: none; }
    </style>
</head>
<body>

<div class="app-header">
    <div id="clock">00:00:00</div>
    <div class="date-label" id="date">--</div>
</div>

<div class="tabs-container">
    <div class="tabs-row" id="tabsBuffers"></div>
    <div class="tabs-row" id="tabsDocas"></div>
</div>

<div class="container">
    <div id="formEntrada" class="add-box">
        <input type="text" id="ruaNum" class="input-main" placeholder="NOME DO ESTADO">
        
        <div class="color-picker" id="colorPicker">
            <div class="color-opt active" style="background:#2f81f7" data-color="#2f81f7"></div>
            <div class="color-opt" style="background:#f85149" data-color="#f85149"></div>
            <div class="color-opt" style="background:#238636" data-color="#238636"></div>
            <div class="color-opt" style="background:#d29922" data-color="#d29922"></div>
            <div class="color-opt" style="background:#8957e5" data-color="#8957e5"></div>
            <div class="color-opt" style="background:#f62d8f" data-color="#f62d8f"></div>
        </div>

        <div class="counter-row">
            <div class="counter-card">
                <small>Pilhas (1=2)</small>
                <div class="counter-controls">
                    <button class="btn-round" onclick="calc('p', -1, 'dispP', 'dispPP')">-</button>
                    <span class="qty-val" id="dispP">1</span>
                    <button class="btn-round" onclick="calc('p', 1, 'dispP', 'dispPP')">+</button>
                </div>
            </div>
            <div class="counter-card">
                <small>Total Paletes</small>
                <div class="counter-controls">
                    <button class="btn-round" onclick="calc('pp', -1, 'dispP', 'dispPP')">-</button>
                    <span class="qty-val" id="dispPP">2</span>
                    <button class="btn-round" onclick="calc('pp', 1, 'dispP', 'dispPP')">+</button>
                </div>
            </div>
        </div>
        <button onclick="adicionar()" class="btn-big btn-primary">Fixar Estado no Quadro</button>
    </div>

    <div id="mainGrid" class="grid"></div>
    <div id="histSec" style="display:none;"><div id="histLista"></div></div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div style="text-align:center; margin-bottom:20px;">
            <h2 id="mRua" style="font-size:28px; font-weight:800;"></h2>
            <div id="mStatusBadge" class="bloco-status" style="display:inline-block; margin-top:5px;"></div>
        </div>
        
        <div class="counter-row">
            <div class="counter-card">
                <small>Pilhas (1=2)</small>
                <div class="counter-controls">
                    <button class="btn-round" onclick="calc('p', -1, 'mP', 'mPP')">-</button>
                    <span class="qty-val" id="mP">0</span>
                    <button class="btn-round" onclick="calc('p', 1, 'mP', 'mPP')">+</button>
                </div>
            </div>
            <div class="counter-card">
                <small>Total Paletes</small>
                <div class="counter-controls">
                    <button class="btn-round" onclick="calc('pp', -1, 'mP', 'mPP')">-</button>
                    <span class="qty-val" id="mPP">0</span>
                    <button class="btn-round" onclick="calc('pp', 1, 'mP', 'mPP')">+</button>
                </div>
            </div>
        </div>

        <select id="mOperador"></select>

        <button onclick="acao('ATUALIZAR')" class="btn-big btn-info">🔄 Atualizar Quantidade (Fica no Buffer)</button>
        
        <hr style="border: 0; border-top: 1px solid #30363d; margin: 15px 0;">

        <select id="mDocaAlvo"></select>
        <button onclick="acao('MOVIDO')" class="btn-big btn-primary">➔ Enviar para Doca</button>
        <button onclick="acao('CARREGANDO')" class="btn-big btn-warning">🚚 Carregar Caminhão</button>
        <button onclick="acao('CONCLUIDO')" class="btn-big btn-success">✅ Finalizar Carga</button>
        
        <button onclick="excluir()" class="btn-big" style="background:none; color:var(--danger); font-size:12px;">Remover Permanentemente</button>
        <button onclick="fechar()" class="btn-big" style="background:#21262d; color:#fff;">Voltar</button>
    </div>
</div>

<script>
    const BUFFERS = ["B1", "B2", "B3", "B4", "B5"];
    const DOCAS = ["DOCA 53", "DOCA 54", "DOCA 55", "DOCA 56", "DOCA 57", "DOCA 58", "DOCA 59", "DOCA 60", "DOCA 61"];
    const OPERADORES = ["Leandro", "Ale", "Andréa", "Jamil", "Marcão", "Marquinhos", "Núbia", "Ryan"];
    
    let app = JSON.parse(localStorage.getItem('meli_pro_v2')) || { aba: "B1", dados: {}, hist: [] };
    let corSelecionada = "#2f81f7";
    let indexSel = null;

    [...BUFFERS, ...DOCAS].forEach(a => { if(!app.dados[a]) app.dados[a] = []; });

    document.querySelectorAll('.color-opt').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            corSelecionada = opt.dataset.color;
        });
    });

    function calc(tipo, val, idP, idPP) {
        let p = document.getElementById(idP), pp = document.getElementById(idPP);
        let vP = parseInt(p.innerText), vPP = parseInt(pp.innerText);
        
        if(tipo === 'p') {
            let novoP = Math.max(0, vP + val);
            p.innerText = novoP;
            pp.innerText = novoP * 2;
        } else {
            pp.innerText = Math.max(0, vPP + val);
        }
    }

    function render() {
        document.getElementById('tabsBuffers').innerHTML = BUFFERS.map(b => `<button class="tab ${app.aba===b?'active':''}" onclick="mudarAba('${b}')">${b}</button>`).join('') + `<button class="tab hist-tab ${app.aba==='HIST'?'active':''}" onclick="mudarAba('HIST')">Log</button>`;
        document.getElementById('tabsDocas').innerHTML = DOCAS.map(d => `<button class="tab ${app.aba===d?'active':''}" onclick="mudarAba('${d}')">${d.replace('DOCA ','D')}</button>`).join('');
        
        const grid = document.getElementById('mainGrid');
        const hist = document.getElementById('histSec');
        const form = document.getElementById('formEntrada');

        if(app.aba === 'HIST') {
            grid.style.display = 'none'; form.style.display = 'none'; hist.style.display = 'block';
            document.getElementById('histLista').innerHTML = app.hist.map(h => `
                <div class="hist-item">
                    <div><b style="color:var(--accent)">${h.rua}</b><br><small style="color:#8b949e">${h.op}</small></div>
                    <div style="text-align:right"><b>${h.qtd} PAL</b><br><small>${h.acao}</small><br><small style="font-size:9px">${h.data} ${h.hora}</small></div>
                </div>`).join('');
        } else {
            grid.style.display = 'grid'; form.style.display = 'block'; hist.style.display = 'none';
            grid.innerHTML = app.dados[app.aba].map((item, i) => `
                <div class="bloco" onclick="abrirModal(${i})" style="background:${item.cor}15; border-color:${item.cor}; opacity:${item.pp == 0 ? '0.5' : '1'}">
                    <div class="bloco-rua" style="color:${item.cor}">${item.rua}</div>
                    <div class="bloco-qtd" style="color:${item.cor}">${item.pp}</div>
                    <div class="bloco-status">${item.pp == 0 ? 'VAZIO' : item.status}</div>
                </div>`).join('');
        }
        localStorage.setItem('meli_pro_v2', JSON.stringify(app));
    }

    function mudarAba(a) { app.aba = a; render(); }

    function adicionar() {
        let rua = document.getElementById('ruaNum').value;
        if(!rua) return;
        app.dados[app.aba].push({ 
            rua: rua.toUpperCase(), 
            p: parseInt(document.getElementById('dispP').innerText), 
            pp: parseInt(document.getElementById('dispPP').innerText), 
            status: 'BUFFER',
            cor: corSelecionada
        });
        document.getElementById('ruaNum').value = '';
        render();
    }

    function abrirModal(i) {
        indexSel = i;
        let item = app.dados[app.aba][i];
        document.getElementById('mRua').innerText = item.rua;
        document.getElementById('mRua').style.color = item.cor;
        document.getElementById('mStatusBadge').innerText = item.status;
        document.getElementById('mP').innerText = item.p == 0 ? 1 : item.p;
        document.getElementById('mPP').innerText = item.pp == 0 ? 2 : item.pp;
        document.getElementById('mOperador').innerHTML = OPERADORES.map(o => `<option>${o}</option>`).join('');
        document.getElementById('mDocaAlvo').innerHTML = DOCAS.map(d => `<option value="${d}">${d}</option>`).join('');
        document.getElementById('modal').style.display = 'flex';
    }

    function acao(tipo) {
        let item = app.dados[app.aba][indexSel];
        let op = document.getElementById('mOperador').value;
        let nPP = parseInt(document.getElementById('mPP').innerText);
        let nP = parseInt(document.getElementById('mP').innerText);
        let agora = new Date();
        
        let log = { rua: item.rua, qtd: nPP, op: op, data: agora.toLocaleDateString(), hora: agora.toLocaleTimeString().slice(0,5) };

        if (tipo === 'ATUALIZAR') {
            item.pp = nPP;
            item.p = nP;
            item.status = 'BUFFER';
            log.acao = `Abasteceu Buffer`;
        } else if(tipo === 'MOVIDO') {
            let dest = document.getElementById('mDocaAlvo').value;
            app.dados[dest].push({ rua: item.rua, p: nP, pp: nPP, status: 'DOCA', cor: item.cor });
            if(BUFFERS.includes(app.aba)) { item.pp = 0; item.p = 0; item.status = 'VAZIO'; }
            else { app.dados[app.aba].splice(indexSel, 1); }
            log.acao = `Enviado p/ ${dest}`;
        } else if(tipo === 'CARREGANDO') {
            item.status = 'CARREGANDO'; item.pp = nPP; item.p = nP; log.acao = "Iniciou Carga";
        } else {
            log.acao = "Finalizado";
            if(BUFFERS.includes(app.aba)) { item.pp = 0; item.p = 0; item.status = 'VAZIO'; }
            else { app.dados[app.aba].splice(indexSel, 1); }
        }

        app.hist.unshift(log);
        fechar();
    }

    function excluir() { if(confirm("Remover estado definitivamente?")) { app.dados[app.aba].splice(indexSel, 1); fechar(); } }
    function fechar() { document.getElementById('modal').style.display = 'none'; render(); }
    
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        document.getElementById('date').innerText = now.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
    }, 1000);
    
    render();
</script>
</body>
                </html>
